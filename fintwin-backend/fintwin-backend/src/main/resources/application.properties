# ===========================
# FinTwin Backend Configuration
# ===========================

# Server
server.port=${PORT:8080}
spring.application.name=fintwin-backend

# ===========================
# H2 Database
# ===========================
spring.datasource.url=jdbc:h2:mem:fintwin_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=FinTwinSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024
app.jwt.expiration-ms=86400000

# ===========================
# File Upload
# ===========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================
# Logging
# ===========================
logging.level.com.fintwin=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

